<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth & Growth Tracker v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-red: #fb7185;
            --accent-gold: #fbbf24;
            --border-color: #334155;
            --essential-tag: #94a3b8;
            --wealth-tag: #4ade80;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 1100px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { font-size: 1.6rem; margin: 0; background: linear-gradient(to right, #38bdf8, #4ade80); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Summary Stats */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card h3 { margin: 0; font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .card p { margin: 8px 0 0; font-size: 1.6rem; font-weight: 700; }

        /* Table & Layout */
        .main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }

        .table-wrapper { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); overflow-x: auto; }
        
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: #334155; padding: 12px 15px; font-size: 0.8rem; text-align: left; color: #cbd5e1; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; }

        input, select {
            background: #0f172a;
            border: 1px solid var(--border-color);
            color: white;
            padding: 6px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        input[type="number"] { width: 85px; }

        .tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .tag-essential { background: #334155; color: #94a3b8; }
        .tag-wealth { background: rgba(74, 222, 128, 0.2); color: var(--accent-green); }

        .progress-container { width: 100%; background: #0f172a; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .progress-bar { height: 100%; background: var(--accent-blue); transition: 0.3s; }

        .btn { cursor: pointer; padding: 8px 16px; border-radius: 8px; border: none; font-weight: 600; }
        .btn-add { background: var(--accent-blue); color: #0f172a; }
        .btn-delete { background: none; color: var(--accent-red); font-size: 1.2rem; padding: 0 10px; }

        .positive { color: var(--accent-green); }
        .negative { color: var(--accent-red); }

        .chart-box { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); height: fit-content; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Wealth Dashboard</h1>
        <button class="btn btn-add" onclick="addRow()">+ Category</button>
    </header>

    <div class="dashboard-grid">
        <div class="card">
            <h3>Actual Spent</h3>
            <p id="stat-actual">$0</p>
        </div>
        <div class="card">
            <h3>Net Change</h3>
            <p id="stat-diff">$0</p>
        </div>
        <div class="card">
            <h3>Wealth Ratio</h3>
            <p id="stat-ratio" style="color: var(--accent-green);">0%</p>
        </div>
        <div class="card">
            <h3>Goal Progress</h3>
            <p id="stat-goal-avg">0%</p>
        </div>
    </div>

    <div class="main-layout">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Category</th>
                        <th>Type</th>
                        <th>Goal ($)</th>
                        <th>Planned ($)</th>
                        <th>Actual ($)</th>
                        <th>Progress</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div class="chart-box">
            <canvas id="typeChart"></canvas>
            <p style="text-align: center; font-size: 0.8rem; color: #94a3b8; margin-top: 15px;">Spending Distribution</p>
        </div>
    </div>
</div>

<script>
    // Data includes 'type' for Fixed/Wealth toggle and 'goal' for progress tracking
    let budgetData = JSON.parse(localStorage.getItem('myAdvancedBudgetData')) || [
        { name: 'Mortgage', type: 'essential', goal: 0, planned: 3500, actual: 3500 },
        { name: 'Semiconductor ETF', type: 'wealth', goal: 50000, planned: 1000, actual: 1200 },
        { name: '401(k) Catch-up', type: 'wealth', goal: 32500, planned: 2000, actual: 2000 },
        { name: 'Utilities/PG&E', type: 'essential', goal: 0, planned: 300, actual: 285 },
        { name: 'Leisure Travel', type: 'leisure', goal: 5000, planned: 500, actual: 400 }
    ];

    let myChart;

    function init() {
        renderTable();
        updateStats();
        renderChart();
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        budgetData.forEach((item, index) => {
            const progPct = item.goal > 0 ? Math.min(Math.round((item.actual / item.goal) * 100), 100) : 0;
            
            const row = `
                <tr>
                    <td><input type="text" value="${item.name}" onchange="updateData(${index}, 'name', this.value)"></td>
                    <td>
                        <select onchange="updateData(${index}, 'type', this.value)">
                            <option value="essential" ${item.type === 'essential' ? 'selected' : ''}>Essential</option>
                            <option value="wealth" ${item.type === 'wealth' ? 'selected' : ''}>Wealth</option>
                            <option value="leisure" ${item.type === 'leisure' ? 'selected' : ''}>Leisure</option>
                        </select>
                    </td>
                    <td><input type="number" value="${item.goal}" onchange="updateData(${index}, 'goal', this.value)"></td>
                    <td><input type="number" value="${item.planned}" onchange="updateData(${index}, 'planned', this.value)"></td>
                    <td><input type="number" value="${item.actual}" onchange="updateData(${index}, 'actual', this.value)"></td>
                    <td>
                        <span style="font-size: 0.75rem">${item.goal > 0 ? progPct + '%' : 'N/A'}</span>
                        <div class="progress-container" style="display: ${item.goal > 0 ? 'block' : 'none'}">
                            <div class="progress-bar" style="width: ${progPct}%"></div>
                        </div>
                    </td>
                    <td><button class="btn-delete" onclick="deleteRow(${index})">&times;</button></td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    function updateData(index, field, value) {
        if (field === 'name' || field === 'type') {
            budgetData[index][field] = value;
        } else {
            budgetData[index][field] = parseFloat(value) || 0;
        }
        saveAndRefresh();
    }

    function addRow() {
        budgetData.push({ name: 'New Item', type: 'essential', goal: 0, planned: 0, actual: 0 });
        saveAndRefresh();
    }

    function deleteRow(index) {
        budgetData.splice(index, 1);
        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('myAdvancedBudgetData', JSON.stringify(budgetData));
        updateStats();
        renderTable();
        updateChart();
    }

    function updateStats() {
        const totalPlanned = budgetData.reduce((s, i) => s + i.planned, 0);
        const totalActual = budgetData.reduce((s, i) => s + i.actual, 0);
        const wealthTotal = budgetData.filter(i => i.type === 'wealth').reduce((s, i) => s + i.actual, 0);
        
        // Ratio of Wealth building vs Total spending
        const wealthRatio = totalActual > 0 ? Math.round((wealthTotal / totalActual) * 100) : 0;
        
        // Average Goal Progress
        const itemsWithGoals = budgetData.filter(i => i.goal > 0);
        const avgGoal = itemsWithGoals.length > 0 ? 
            Math.round(itemsWithGoals.reduce((s, i) => s + (i.actual / i.goal), 0) / itemsWithGoals.length * 100) : 0;

        document.getElementById('stat-actual').innerText = `$${totalActual.toLocaleString()}`;
        
        const diff = totalPlanned - totalActual;
        const diffEl = document.getElementById('stat-diff');
        diffEl.innerText = (diff >= 0 ? '+$' : '-$') + Math.abs(diff).toLocaleString();
        diffEl.className = diff >= 0 ? 'positive' : 'negative';

        document.getElementById('stat-ratio').innerText = wealthRatio + '%';
        document.getElementById('stat-goal-avg').innerText = avgGoal + '%';
    }

    function renderChart() {
        const ctx = document.getElementById('typeChart').getContext('2d');
        const types = getChartData();
        
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Essential', 'Wealth', 'Leisure'],
                datasets: [{
                    data: [types.essential, types.wealth, types.leisure],
                    backgroundColor: ['#334155', '#4ade80', '#a78bfa'],
                    hoverOffset: 4,
                    borderWidth: 0
                }]
            },
            options: {
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#cbd5e1', font: { size: 10 } } }
                },
                cutout: '70%'
            }
        });
    }

    function getChartData() {
        return {
            essential: budgetData.filter(i => i.type === 'essential').reduce((s, i) => s + i.actual, 0),
            wealth: budgetData.filter(i => i.type === 'wealth').reduce((s, i) => s + i.actual, 0),
            leisure: budgetData.filter(i => i.type === 'leisure').reduce((s, i) => s + i.actual, 0)
        };
    }

    function updateChart() {
        const newData = getChartData();
        myChart.data.datasets[0].data = [newData.essential, newData.wealth, newData.leisure];
        myChart.update();
    }

    init();
</script>

</body>
</html>
