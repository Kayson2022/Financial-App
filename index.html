<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --blue: #38bdf8; --green: #4ade80; --red: #fb7185;
            --purple: #a855f7; --border: #334155; --muted: #94a3b8;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 25px; }
        .container { max-width: 1400px; margin: 0 auto; display: none; }
        #login-screen { height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-size: 2rem; color: var(--blue); margin: 0; font-weight: 700; }

        /* Top Summary Cards */
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 24px; border-radius: 12px; border: 1px solid var(--border); }
        .card h3 { margin: 0; font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .card p { margin: 12px 0 0; font-size: 2.2rem; font-weight: 700; color: #fff; }

        /* Dashboard Layout */
        .dashboard-layout { display: grid; grid-template-columns: 1fr 400px; gap: 25px; align-items: start; }
        
        /* Table Section */
        .table-wrap { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #1e293b; padding: 15px; text-align: left; font-size: 0.85rem; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 600; }
        td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }

        /* Chart Section */
        .chart-section { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .chart-container { height: 320px; position: relative; width: 100%; margin: 0 auto; }
        .chart-label { margin-top: 20px; color: var(--muted); font-size: 0.9rem; font-weight: 500; }

        /* Form Elements - Exact Sizing */
        input, select { background: #0f172a; border: 1px solid var(--border); color: #fff; padding: 8px 12px; border-radius: 6px; width: 100%; font-size: 0.9rem; transition: border 0.2s; }
        input:focus { outline: none; border-color: var(--blue); }
        
        .btn { padding: 10px 22px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 0.95rem; white-space: nowrap; }
        .btn-blue { background: var(--blue); color: #0f172a; }
        
        /* Progress Visualization */
        .prog-col { display: flex; align-items: center; gap: 10px; }
        .prog-text { min-width: 35px; font-weight: 600; }
        .prog-bar-bg { flex-grow: 1; background: #0f172a; height: 8px; border-radius: 4px; overflow: hidden; }
        .prog-bar-fill { background: var(--blue); height: 100%; transition: width 0.4s ease-out; }

        .positive { color: var(--green) !important; }
        .negative { color: var(--red) !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="margin-bottom: 25px;">Wealth Dashboard</h1>
    <button class="btn btn-blue" onclick="login()">Sign In with Google</button>
</div>

<div class="container" id="app-container">
    <header>
        <h1>Wealth Dashboard</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button class="btn btn-blue" onclick="addItem()">+ Category</button>
            <button class="btn" style="background:transparent; color:var(--muted);" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="summary-grid">
        <div class="card"><h3>Actual Spent</h3><p id="stat-actual">$0</p></div>
        <div class="card"><h3>Net Change</h3><p id="stat-change">$0</p></div>
        <div class="card"><h3>Wealth Ratio</h3><p id="stat-ratio" style="color:var(--green)">0%</p></div>
        <div class="card"><h3>Goal Progress</h3><p id="stat-goal">0%</p></div>
    </div>

    <div class="dashboard-layout">
        <div class="table-wrap">
            <table>
                <colgroup>
                    <col style="width: 25%;">
                    <col style="width: 15%;">
                    <col style="width: 15%;">
                    <col style="width: 15%;">
                    <col style="width: 15%;">
                    <col style="width: 15%;">
                </colgroup>
                <thead>
                    <tr>
                        <th>Category</th>
                        <th>Type</th>
                        <th>Goal ($)</th>
                        <th>Planned ($)</th>
                        <th>Actual ($)</th>
                        <th>Prog</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div class="chart-section">
            <div class="chart-container"><canvas id="distChart"></canvas></div>
            <div class="chart-label">Spending Distribution</div>
        </div>
    </div>
</div>

<script>
    // Firebase Config (Keep these as they are specifically for your project)
    const firebaseConfig = {
        apiKey: "AIzaSyDI-pKwAvALBeOrdZAEXNEoI2B0NEZXHd8",
        authDomain: "financial-app-735b0.firebaseapp.com",
        projectId: "financial-app-735b0",
        storageBucket: "financial-app-735b0.firebasestorage.app",
        messagingSenderId: "650850478061",
        appId: "1:650850478061:web:6357707ed78568df9129e4"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let state = { items: [] };
    let dChart;

    // Comma Separator Formatter
    const fmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            loadData(user.uid);
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-container').style.display = 'none';
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut(); }

    async function loadData(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) {
            state = doc.data();
        } else {
            state = { items: [
                { name: 'Mortgage', type: 'Essential', goal: 0, planned: 3500, actual: 3500 },
                { name: 'Semiconductor ETF', type: 'Wealth', goal: 50000, planned: 1000, actual: 1200 },
                { name: '401(k) Catch-up', type: 'Wealth', goal: 32500, planned: 2000, actual: 2000 },
                { name: 'Utilities/PG&E', type: 'Essential', goal: 0, planned: 300, actual: 285 },
                { name: 'Leisure Travel', type: 'Leisure', goal: 5000, planned: 500, actual: 400 }
            ]};
            saveData();
        }
        refreshUI();
    }

    async function saveData() {
        const user = auth.currentUser;
        if (user) await db.collection('users').doc(user.uid).set(state);
        refreshUI();
    }

    function refreshUI() {
        const body = document.getElementById('table-body');
        body.innerHTML = '';
        let actT = 0, planT = 0, wealthT = 0, totalG = 0, currentG = 0;
        let cData = { Essential: 0, Wealth: 0, Leisure: 0 };

        state.items.forEach((item, i) => {
            actT += item.actual; planT += item.planned;
            cData[item.type] += item.actual;
            if(item.type === 'Wealth') wealthT += item.actual;
            
            let prog = 0;
            if(item.goal > 0) {
                prog = Math.round((item.actual / item.goal) * 100);
                totalG += item.goal; currentG += item.actual;
            }

            body.innerHTML += `<tr>
                <td><input value="${item.name}" onchange="update(${i},'name',this.value)"></td>
                <td><select onchange="update(${i},'type',this.value)">
                    <option value="Essential" ${item.type==='Essential'?'selected':''}>Essential</option>
                    <option value="Wealth" ${item.type==='Wealth'?'selected':''}>Wealth</option>
                    <option value="Leisure" ${item.type==='Leisure'?'selected':''}>Leisure</option>
                </select></td>
                <td><input type="number" value="${item.goal}" onchange="update(${i},'goal',this.value)"></td>
                <td><input type="number" value="${item.planned}" onchange="update(${i},'planned',this.value)"></td>
                <td><input type="number" value="${item.actual}" onchange="update(${i},'actual',this.value)"></td>
                <td>
                    <div class="prog-col">
                        <span class="prog-text">${item.goal > 0 ? prog + '%' : 'N/A'}</span>
                        ${item.goal > 0 ? `<div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${Math.min(prog,100)}%"></div></div>` : ''}
                    </div>
                </td>
            </tr>`;
        });

        const net = planT - actT;
        document.getElementById('stat-actual').innerText = fmt.format(actT);
        document.getElementById('stat-change').innerText = (net < 0 ? '-' : '') + fmt.format(Math.abs(net));
        document.getElementById('stat-change').className = net < 0 ? 'negative' : 'positive';
        document.getElementById('stat-ratio').innerText = Math.round((wealthT/actT)*100 || 0) + '%';
        document.getElementById('stat-goal').innerText = Math.round((currentG/totalG)*100 || 0) + '%';

        renderChart(cData);
    }

    function renderChart(data) {
        const ctx = document.getElementById('distChart').getContext('2d');
        if (dChart) dChart.destroy();
        dChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Essential', 'Wealth', 'Leisure'],
                datasets: [{
                    data: [data.Essential, data.Wealth, data.Leisure],
                    backgroundColor: ['#334155', '#4ade80', '#a855f7'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '78%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });
    }

    function update(i, f, v) { 
        state.items[i][f] = (f==='name'||f==='type') ? v : parseFloat(v)||0; 
        saveData(); 
    }
    function addItem() { state.items.push({name:'New', type:'Essential', goal:0, planned:0, actual:0}); saveData(); }
</script>
</body>
</html>
