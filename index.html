<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayson Wealth Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --blue: #38bdf8; --green: #4ade80; --red: #fb7185;
            --purple: #a855f7; --border: #334155;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: none; }
        #login-screen { height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; color: var(--blue); margin: 0; }

        /* Summary Cards */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .card h3 { margin: 0; font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: 700; }

        /* Layout Columns */
        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 20px; align-items: start; }
        
        .table-wrap { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1e293b; padding: 12px 15px; text-align: left; font-size: 0.75rem; color: #94a3b8; border-bottom: 1px solid var(--border); }
        td { padding: 10px 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        /* Chart Section */
        .chart-box { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .chart-container { height: 280px; position: relative; margin-top: 10px; }

        /* Inputs */
        input, select { background: #0f172a; border: 1px solid var(--border); color: white; padding: 6px 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; }
        .btn-blue { background: var(--blue); color: #0f172a; }
        
        /* Progress Bar */
        .prog-bg { background: #0f172a; height: 6px; border-radius: 3px; margin-top: 4px; overflow: hidden; width: 100%; }
        .prog-fill { background: var(--blue); height: 100%; transition: 0.3s; }
        
        .positive { color: var(--green); }
        .negative { color: var(--red); }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>Kayson Wealth Dashboard</h1>
    <button class="btn btn-blue" style="margin-top:20px" onclick="login()">Access Secure Vault</button>
</div>

<div class="container" id="app-container">
    <header>
        <h1>Wealth Dashboard</h1>
        <div>
            <button class="btn btn-blue" onclick="addItem()">+ Category</button>
            <button class="btn" style="background:transparent; color:#94a3b8; font-size:0.8rem;" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="summary-grid">
        <div class="card"><h3>Actual Spent</h3><p id="s-actual">$0</p></div>
        <div class="card"><h3>Net Change</h3><p id="s-change">$0</p></div>
        <div class="card"><h3>Wealth Ratio</h3><p id="s-ratio" style="color:var(--green)">0%</p></div>
        <div class="card"><h3>Goal Progress</h3><p id="s-goal">0%</p></div>
    </div>

    <div class="main-layout">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Category</th><th>Type</th><th>Goal ($)</th><th>Planned ($)</th><th>Actual ($)</th><th>Progress</th><th></th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div class="chart-box">
            <div class="chart-container"><canvas id="spendingChart"></canvas></div>
            <p style="margin-top:15px; font-size:0.8rem; color:#94a3b8">Spending Distribution</p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDI-pKwAvALBeOrdZAEXNEoI2B0NEZXHd8",
        authDomain: "financial-app-735b0.firebaseapp.com",
        projectId: "financial-app-735b0",
        storageBucket: "financial-app-735b0.firebasestorage.app",
        messagingSenderId: "650850478061",
        appId: "1:650850478061:web:6357707ed78568df9129e4"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let state = { items: [] };
    let myChart;

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            loadData(user.uid);
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-container').style.display = 'none';
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut(); }

    async function loadData(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) {
            state = doc.data();
        } else {
            state = { items: [
                { name: 'Mortgage', type: 'Essential', goal: 0, planned: 3500, actual: 3500 },
                { name: '401(k) Catch-up', type: 'Wealth', goal: 32500, planned: 2000, actual: 2000 },
                { name: 'Utilities/PG&E', type: 'Essential', goal: 0, planned: 300, actual: 285 },
                { name: 'Leisure Travel', type: 'Leisure', goal: 5000, planned: 500, actual: 400 }
            ]};
            saveData();
        }
        refreshUI();
    }

    async function saveData() {
        const user = auth.currentUser;
        if (user) await db.collection('users').doc(user.uid).set(state);
        refreshUI();
    }

    function refreshUI() {
        const body = document.getElementById('table-body');
        body.innerHTML = '';
        let actT = 0, planT = 0, wealthT = 0, goalProgT = 0, goalTargetT = 0;
        let chartData = { Essential: 0, Wealth: 0, Leisure: 0 };

        state.items.forEach((item, i) => {
            actT += item.actual; planT += item.planned;
            chartData[item.type] += item.actual;
            if(item.type === 'Wealth') wealthT += item.actual;
            
            let progPct = 0;
            if(item.goal > 0) {
                progPct = Math.round((item.actual / item.goal) * 100);
                goalProgT += item.actual; goalTargetT += item.goal;
            }

            body.innerHTML += `<tr>
                <td><input value="${item.name}" onchange="update(${i},'name',this.value)"></td>
                <td><select onchange="update(${i},'type',this.value)">
                    <option value="Essential" ${item.type==='Essential'?'selected':''}>Essential</option>
                    <option value="Wealth" ${item.type==='Wealth'?'selected':''}>Wealth</option>
                    <option value="Leisure" ${item.type==='Leisure'?'selected':''}>Leisure</option>
                </select></td>
                <td><input type="number" value="${item.goal}" onchange="update(${i},'goal',this.value)"></td>
                <td><input type="number" value="${item.planned}" onchange="update(${i},'planned',this.value)"></td>
                <td><input type="number" value="${item.actual}" onchange="update(${i},'actual',this.value)"></td>
                <td>
                    <div style="font-size:0.75rem">${item.goal > 0 ? progPct + '%' : 'N/A'}</div>
                    ${item.goal > 0 ? `<div class="prog-bg"><div class="prog-fill" style="width:${Math.min(progPct,100)}%"></div></div>` : ''}
                </td>
                <td><button onclick="remove(${i})" style="background:none; border:none; color:var(--red); cursor:pointer; font-size:1.2rem">&times;</button></td>
            </tr>`;
        });

        const netChange = planT - actT;
        document.getElementById('s-actual').innerText = `$${actT.toLocaleString()}`;
        document.getElementById('s-change').innerText = (netChange >= 0 ? '$' : '-$') + Math.abs(netChange).toLocaleString();
        document.getElementById('s-change').className = netChange >= 0 ? 'positive' : 'negative';
        document.getElementById('s-ratio').innerText = Math.round((wealthT/actT)*100 || 0) + '%';
        document.getElementById('s-goal').innerText = (goalTargetT > 0 ? Math.round((goalProgT/goalTargetT)*100) : 0) + '%';

        updateChart(chartData);
    }

    function updateChart(data) {
        const ctx = document.getElementById('spendingChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Essential', 'Wealth', 'Leisure'],
                datasets: [{
                    data: [data.Essential, data.Wealth, data.Leisure],
                    backgroundColor: ['#1e293b', '#4ade80', '#a855f7'],
                    borderWidth: 0,
                    hoverOffset: 4
                }]
            },
            options: { cutout: '75%', plugins: { legend: { display: false } } }
        });
    }

    function update(i, f, v) { 
        state.items[i][f] = (f==='goal'||f==='planned'||f==='actual') ? parseFloat(v)||0 : v; 
        saveData(); 
    }
    function remove(i) { state.items.splice(i, 1); saveData(); }
    function addItem() { state.items.push({name:'New', type:'Essential', goal:0, planned:0, actual:0}); saveData(); }
</script>
</body>
</html>
