<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111827; --card: #1f2937; --text: #f9fafb;
            --blue: #38bdf8; --green: #4ade80; --red: #fb7185;
            --purple: #a855f7; --border: #374151; --muted: #9ca3af;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 30px; }
        .container { max-width: 1400px; margin: 0 auto; display: none; }
        #login-screen { height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-size: 2.2rem; background: linear-gradient(90deg, #38bdf8, #4ade80); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; font-weight: 800; }

        /* Top Summary Cards */
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card h3 { margin: 0; font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .card p { margin: 15px 0 0; font-size: 2.5rem; font-weight: 800; color: #fff; }

        /* Dashboard Layout */
        .dashboard-layout { display: grid; grid-template-columns: 1fr 400px; gap: 30px; align-items: start; }
        
        /* Table Section */
        .table-wrap { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1f2937; padding: 18px; text-align: left; font-size: 0.9rem; color: var(--muted); border-bottom: 1px solid var(--border); }
        td { padding: 15px 18px; border-bottom: 1px solid var(--border); font-size: 1rem; }

        /* Chart Section */
        .chart-section { background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid var(--border); text-align: center; height: 100%; }
        .chart-container { height: 350px; position: relative; margin-bottom: 20px; }
        .chart-label { color: var(--muted); font-size: 1rem; font-weight: 500; }

        /* Inputs & Buttons */
        input, select { background: #111827; border: 1px solid var(--border); color: #fff; padding: 10px 14px; border-radius: 8px; width: 100%; font-size: 1rem; box-sizing: border-box; }
        .btn { padding: 12px 24px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 1rem; transition: transform 0.1s; display: inline-flex; align-items: center; justify-content: center; }
        .btn-blue { background: var(--blue); color: #0f172a; }
        .btn:active { transform: scale(0.98); }
        
        /* Progress Bar Styles */
        .prog-container { display: flex; align-items: center; gap: 12px; min-width: 140px; }
        .prog-val { font-weight: 700; font-size: 0.95rem; width: 45px; }
        .prog-track { flex-grow: 1; background: #111827; height: 10px; border-radius: 5px; overflow: hidden; position: relative; }
        .prog-bar { background: var(--blue); height: 100%; border-radius: 5px; transition: width 0.5s ease; }

        .positive { color: var(--green) !important; }
        .negative { color: var(--red) !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1 style="margin-bottom: 30px;">Wealth Dashboard</h1>
    <button class="btn btn-blue" onclick="login()">Sign In with Google</button>
</div>

<div class="container" id="app-container">
    <header>
        <h1>Wealth Dashboard</h1>
        <div style="display: flex; gap: 15px;">
            <button class="btn btn-blue" onclick="addItem()">+ Category</button>
            <button class="btn" style="background:transparent; color:var(--muted); border: 1px solid var(--border);" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="summary-grid">
        <div class="card"><h3>Actual Spent</h3><p id="s-actual">$0</p></div>
        <div class="card"><h3>Net Change</h3><p id="s-change">$0</p></div>
        <div class="card"><h3>Wealth Ratio</h3><p id="s-ratio" style="color:var(--green)">0%</p></div>
        <div class="card"><h3>Goal Progress</h3><p id="s-goal">0%</p></div>
    </div>

    <div class="dashboard-layout">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width: 25%;">Category</th>
                        <th style="width: 15%;">Type</th>
                        <th style="width: 15%;">Goal ($)</th>
                        <th style="width: 15%;">Planned ($)</th>
                        <th style="width: 15%;">Actual ($)</th>
                        <th style="width: 15%;">Prog</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div class="chart-section">
            <div class="chart-container"><canvas id="mainChart"></canvas></div>
            <div class="chart-label">Spending Distribution</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDI-pKwAvALBeOrdZAEXNEoI2B0NEZXHd8",
        authDomain: "financial-app-735b0.firebaseapp.com",
        projectId: "financial-app-735b0",
        storageBucket: "financial-app-735b0.firebasestorage.app",
        messagingSenderId: "650850478061",
        appId: "1:650850478061:web:6357707ed78568df9129e4"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let state = { items: [] };
    let donutChart;

    // Number Formatter with Commas
    const nFmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            loadData(user.uid);
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-container').style.display = 'none';
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function logout() { auth.signOut(); }

    async function loadData(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) state = doc.data();
        else {
            state = { items: [
                { name: 'Mortgage', type: 'Essential', goal: 0, planned: 3500, actual: 3500 },
                { name: '401(k) Catch-up', type: 'Wealth', goal: 32500, planned: 2000, actual: 2000 }
            ]};
            saveData();
        }
        refreshUI();
    }

    async function saveData() {
        const user = auth.currentUser;
        if (user) await db.collection('users').doc(user.uid).set(state);
        refreshUI();
    }

    function refreshUI() {
        const body = document.getElementById('table-body');
        body.innerHTML = '';
        let actT = 0, planT = 0, wealthT = 0, totalG = 0, currentG = 0;
        let dist = { Essential: 0, Wealth: 0, Leisure: 0 };

        state.items.forEach((item, i) => {
            actT += item.actual; planT += item.planned;
            dist[item.type] += item.actual;
            if(item.type === 'Wealth') wealthT += item.actual;
            
            let pVal = 0;
            if(item.goal > 0) {
                pVal = Math.round((item.actual / item.goal) * 100);
                totalG += item.goal; currentG += item.actual;
            }

            body.innerHTML += `<tr>
                <td><input value="${item.name}" onchange="upd(${i},'name',this.value)"></td>
                <td><select onchange="upd(${i},'type',this.value)">
                    <option value="Essential" ${item.type==='Essential'?'selected':''}>Essential</option>
                    <option value="Wealth" ${item.type==='Wealth'?'selected':''}>Wealth</option>
                    <option value="Leisure" ${item.type==='Leisure'?'selected':''}>Leisure</option>
                </select></td>
                <td><input type="number" value="${item.goal}" onchange="upd(${i},'goal',this.value)"></td>
                <td><input type="number" value="${item.planned}" onchange="upd(${i},'planned',this.value)"></td>
                <td><input type="number" value="${item.actual}" onchange="upd(${i},'actual',this.value)"></td>
                <td>
                    <div class="prog-container">
                        <span class="prog-val">${item.goal > 0 ? pVal + '%' : 'N/A'}</span>
                        ${item.goal > 0 ? `<div class="prog-track"><div class="prog-bar" style="width:${Math.min(pVal,100)}%"></div></div>` : ''}
                    </div>
                </td>
            </tr>`;
        });

        const diff = planT - actT;
        document.getElementById('s-actual').innerText = nFmt.format(actT);
        document.getElementById('s-change').innerText = (diff < 0 ? '-' : '') + nFmt.format(Math.abs(diff));
        document.getElementById('s-change').className = diff < 0 ? 'negative' : 'positive';
        document.getElementById('s-ratio').innerText = Math.round((wealthT/actT)*100 || 0) + '%';
        document.getElementById('s-goal').innerText = Math.round((currentG/totalG)*100 || 0) + '%';

        updateChart(dist);
    }

    function updateChart(data) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (donutChart) donutChart.destroy();
        donutChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Essential', 'Wealth', 'Leisure'],
                datasets: [{
                    data: [data.Essential, data.Wealth, data.Leisure],
                    backgroundColor: ['#374151', '#4ade80', '#a855f7'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '82%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
        });
    }

    function upd(i, f, v) { 
        state.items[i][f] = (f==='name'||f==='type') ? v : parseFloat(v)||0; 
        saveData(); 
    }
    function addItem() { state.items.push({name:'New', type:'Essential', goal:0, planned:0, actual:0}); saveData(); }
</script>
</body>
</html>
