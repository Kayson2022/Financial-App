<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayson Home Manager</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --blue: #38bdf8; --green: #4ade80; --red: #fb7185;
            --border: #334155; --purple: #a855f7;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; display: none; }
        #login-screen { height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .nav { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .nav-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-weight: 600; padding: 12px 20px; border-radius: 8px; }
        .nav-btn.active { background: var(--card); color: var(--blue); }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .card h3 { margin: 0; font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
        .card p { margin: 8px 0 0; font-size: 1.5rem; font-weight: 700; }

        .table-wrap { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #334155; padding: 12px; text-align: left; font-size: 0.75rem; color: #cbd5e1; }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        input, select { background: #0f172a; border: 1px solid var(--border); color: white; padding: 6px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; }
        .btn-blue { background: var(--blue); color: #0f172a; }
        .positive { color: var(--green); }
        .negative { color: var(--red); }
    </style>
</head>
<body>

<div id="login-screen">
    <h2 style="color: var(--blue)">Home Personal Dashboard</h2>
    <button class="btn btn-blue" onclick="login()">Sign In</button>
</div>

<div class="container" id="app-container">
    <div class="nav">
        <button class="nav-btn active" onclick="showTab('home-budget')">House Budget</button>
        <button class="nav-btn" onclick="showTab('goals')">Future Projects</button>
    </div>

    <div id="home-budget" class="tab-content active">
        <div class="grid">
            <div class="card"><h3>Monthly Spend</h3><p id="total-actual">$0</p></div>
            <div class="card"><h3>Utility Impact</h3><p id="utility-total" style="color: var(--purple)">$0</p></div>
            <div class="card"><h3>Savings Contribution</h3><p id="savings-total" style="color: var(--green)">$0</p></div>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Home Category</th><th>Type</th><th>Planned ($)</th><th>Actual ($)</th><th></th></tr></thead>
                <tbody id="budget-body"></tbody>
            </table>
        </div>
        <button class="btn btn-blue" onclick="addItem('budget')">+ Add Household Item</button>
    </div>

    <div id="goals" class="tab-content">
        <div class="grid" id="goals-grid"></div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Project/Goal</th><th>Target ($)</th><th>Saved ($)</th><th>%</th><th></th></tr></thead>
                <tbody id="goals-body"></tbody>
            </table>
        </div>
        <button class="btn btn-blue" onclick="addItem('milestones')">+ New Project/Goal</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (SAME AS BEFORE) ---
    const firebaseConfig = {
        apiKey: "AIzaSyDI-pKwAvALBeOrdZAEXNEoI2B0NEZXHd8",
        authDomain: "financial-app-735b0.firebaseapp.com",
        projectId: "financial-app-735b0",
        storageBucket: "financial-app-735b0.firebasestorage.app",
        messagingSenderId: "650850478061",
        appId: "1:650850478061:web:6357707ed78568df9129e4"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let state = { budget: [], milestones: [] };

    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            loadData(user.uid);
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-container').style.display = 'none';
        }
    });

    function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    async function loadData(uid) {
        const doc = await db.collection('users').doc(uid).get();
        if (doc.exists) {
            state = doc.data();
        } else {
            state = { 
                budget: [
                    { name: 'Mortgage/Insurance', type: 'Fixed', planned: 3500, actual: 3500 },
                    { name: 'PG&E Utilities', type: 'Utility', planned: 350, actual: 0 },
                    { name: 'Education Fund', type: 'Savings', planned: 500, actual: 0 }
                ],
                milestones: [{ name: 'Kitchen Upgrade', target: 15000, saved: 2000 }]
            };
            saveData();
        }
        refreshUI();
    }

    async function saveData() {
        const user = auth.currentUser;
        if (user) await db.collection('users').doc(user.uid).set(state);
        refreshUI();
    }

    function refreshUI() {
        const bBody = document.getElementById('budget-body');
        bBody.innerHTML = '';
        let actT = 0, utilT = 0, saveT = 0;

        state.budget.forEach((item, i) => {
            actT += item.actual;
            if(item.type === 'Utility') utilT += item.actual;
            if(item.type === 'Savings') saveT += item.actual;

            bBody.innerHTML += `<tr>
                <td><input value="${item.name}" onchange="update('budget',${i},'name',this.value)"></td>
                <td><select onchange="update('budget',${i},'type',this.value)">
                    <option value="Fixed" ${item.type==='Fixed'?'selected':''}>Fixed</option>
                    <option value="Utility" ${item.type==='Utility'?'selected':''}>Utility</option>
                    <option value="Savings" ${item.type==='Savings'?'selected':''}>Savings</option>
                    <option value="Personal" ${item.type==='Personal'?'selected':''}>Personal</option>
                </select></td>
                <td><input type="number" value="${item.planned}" onchange="update('budget',${i},'planned',this.value)"></td>
                <td><input type="number" value="${item.actual}" onchange="update('budget',${i},'actual',this.value)"></td>
                <td><button onclick="remove('budget',${i})" style="background:none; border:none; color:var(--red); cursor:pointer">&times;</button></td>
            </tr>`;
        });

        document.getElementById('total-actual').innerText = `$${actT.toLocaleString()}`;
        document.getElementById('utility-total').innerText = `$${utilT.toLocaleString()}`;
        document.getElementById('savings-total').innerText = `$${saveT.toLocaleString()}`;

        const gBody = document.getElementById('goals-body');
        const gGrid = document.getElementById('goals-grid');
        gBody.innerHTML = ''; gGrid.innerHTML = '';

        state.milestones.forEach((m, i) => {
            const pct = Math.min(Math.round((m.saved / m.target) * 100), 100) || 0;
            gGrid.innerHTML += `<div class="card"><h3>${m.name}</h3><p>${pct}%</p><div style="font-size:0.7rem; color:#94a3b8">Progress toward $${m.target.toLocaleString()}</div></div>`;
            gBody.innerHTML += `<tr>
                <td><input value="${m.name}" onchange="update('milestones',${i},'name',this.value)"></td>
                <td><input type="number" value="${m.target}" onchange="update('milestones',${i},'target',this.value)"></td>
                <td><input type="number" value="${m.saved}" onchange="update('milestones',${i},'saved',this.value)"></td>
                <td>${pct}%</td>
                <td><button onclick="remove('milestones',${i})" style="background:none; border:none; color:var(--red); cursor:pointer">&times;</button></td>
            </tr>`;
        });
    }

    function update(tab, i, f, v) {
        state[tab][i][f] = (f==='planned'||f==='actual'||f==='target'||f==='saved') ? parseFloat(v)||0 : v;
        saveData();
    }
    function remove(tab, i) { state[tab].splice(i,1); saveData(); }
    function addItem(tab) {
        const obj = tab === 'budget' ? {name:'New Item', type:'Fixed', planned:0, actual:0} : {name:'New Goal', target:1000, saved:0};
        state[tab].push(obj);
        saveData();
    }
</script>
</body>
</html>
